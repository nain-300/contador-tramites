name: Build Windows EXE

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pyinstaller==5.13.2 pillow keyboard openpyxl
          
      - name: Build EXE
        run: pyinstaller --onefile --windowed --icon=icono.ico --name "Contador de Tramites" --hidden-import=collections.abc --hidden-import=keyboard --hidden-import=openpyxl --collect-all keyboard --collect-all openpyxl contador.py
      - name: Create or update Release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Ultima version"
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "dist/Contador de Tramites.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
